services:
  - type: web
    name: smartfarm-ai
    runtime: python
    pythonVersion: "3.11"
    rootDir: python-app
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT "run:app"
    envVars:
      - key: FLASK_ENV
        value: production
      - key: FLASK_DEBUG
        value: "0"
      - key: MONGODB_URI
        sync: false          # set this in Render dashboard — keep secret
      - key: ML_MODEL_HOSTPORT
        fromService:
          name: smartfarm-ml
          type: pserv
          property: hostport
      - key: ALLOW_DEMO_FALLBACK
        value: "false"
      - key: MAX_CONTENT_LENGTH
        value: "10485760"
      - key: SECRET_KEY
        generateValue: true  # Render auto-generates a secure value

  - type: pserv
    name: smartfarm-ml
    runtime: python
    pythonVersion: "3.11"
    rootDir: python-app/ml_model
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: REQUIRE_REAL_MODEL
        value: "true"
      - key: MODEL_PATH
        value: models/plant_disease_model.h5
